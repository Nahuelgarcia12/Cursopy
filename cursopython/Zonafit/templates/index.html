<!doctype html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{titulo}}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
</head>
<body>
<div class="container">
    <!-- Titulo-->
    <div class="container py-3">
        <h1 class="display-5 text-center text-primary">
            {{titulo}} <i class="bi bi-award"></i>
        </h1>
    </div>
    <!--Grid principal -->
    <div class="container-fluid pb-3">
        <div class="d-grid gap-3" style="grid-template-columns: 1fr 2fr;">

            <!-- FORMULARIO -->
            <div class="border rounded-3 p-2">
                <!-- aquí va el formulario -->
                <form action="/guardar" method="POST" autocomplete="off">
                    <!--Nombre -->
                    <div class="form-floating py-2">
                        <input type="text" class="form-control " id="nombre" placeholder="Nombre"/>
                        <label for="nombre" class="form-label">Nombre</label>
                    </div>
                    <!--apellido -->
                    <div class="form-floating py-2">
                        <input type="text" class="form-control " id="apellido" placeholder="Apellido"/>
                        <label for="apellido" class="form-label">Apellido</label>
                    </div>
                    <!--Membresia -->
                    <div class="form-floating py-2">
                        <input type="number" class="form-control " id="membresia" placeholder="Membresia"/>
                        <label for="membresia" class="form-label">Membresia</label>
                    </div>
                    <div class="text-center py-3">
                        <button type="submit" class="btn btn-success btn-sm me-3">Guardar
                        </button>
                        <input type="reset" class="btn btn-danger btn-sm me-3" value="limpiar">

                    </div>
                </form>
            </div>

            <!-- TABLA -->
            <div class="border rounded-3 p-2">
                <table class="table table-striped table-hover">
                    <thead class="table-primary">
                    <tr>
                        <th>Id</th>
                        <th>Nombre</th>
                        <th>Apellido</th>
                        <th>Membresia</th>
                        <th></th>
                    </tr>
                    </thead>
                    <tbody>
                    {% for cliente in clientes %}
                    <tr>
                        <td>{{cliente.id}}</td>
                        <td>{{cliente.nombre}}</td>
                        <td>{{cliente.apellido}}</td>
                        <td>{{cliente.membresia}}</td>
                        <td class="text-center">
                            <div>
                                <a href="/editar/{{cliente.id}}" class="btn btn-primary btn-sm me-3 ">
                                    <i class="bi bi-pencil"></i>
                                </a>
                                <a href="/eliminar/{{cliente.id}}" class="btn btn-danger btn-sm me-3 ">
                                    <i class="bi bi-trash3"></i>
                                </a>


                            </div>
                        </td>
                    </tr>
                    {% endfor %}
                    </tbody>
                </table>

            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>
</html>
